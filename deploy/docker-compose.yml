version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: greenops_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: greenops
      POSTGRES_PASSWORD: greenops
      POSTGRES_DB: greenops
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenops"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    container_name: greenops_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: greenops
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: greenops_ingestion
    restart: unless-stopped
    environment:
      PG_CONN: "host=postgres port=5432 user=greenops password=greenops dbname=greenops sslmode=disable"
      RAW_PATH: /data/raw
      PARQUET_PATH: /data/parquet
      RENNES_HOST: frontend.rennes.grid5000.fr
      LILLE_HOST: frontend.lille.grid5000.fr
      NANCY_HOST: frontend.nancy.grid5000.fr
      HOME: /app
    volumes:
      - rawdata:/data/raw
      - parquetdata:/data/parquet
      - ~/.ssh/id_rsa:/mnt/ssh/id_rsa:ro
    depends_on:
      postgres:
        condition: service_healthy

  csv2parquet:
    build:
      context: ../pipeline
      dockerfile: Dockerfile
    container_name: greenops_parquet
    restart: unless-stopped
    environment:
      RAW_PATH: /data/raw
      PARQUET_PATH: /data/parquet
      POLL_INTERVAL: "300"  # seconds
    volumes:
      - rawdata:/data/raw
      - parquetdata:/data/parquet
    depends_on:
      - ingestion


  notebook:
    image: jupyter/datascience-notebook:python-3.9
    ports:
      - "8888:8888"
    volumes:
      - ../analysis:/home/jovyan/work
      # 1. Monte ton dossier de projet actuel pour retrouver ton fichier .ipynb
      - .:/app 
      # 2. Monte tes volumes de données partagés (en lecture seule :ro pour l'analyse)
      - rawdata:/data/raw:ro
      - parquetdata:/data/parquet:ro
    environment:
      - PROJECT_DIR=/app
      - RAW_PATH=/data/raw
      - PARQUET_PATH=/data/parquet
      # ⚠️ ATTENTION : Dans le réseau Docker, 'localhost' devient le nom de ton service Postgres
      - PG_URL=postgresql://greenops:greenops@postgres:5432/greenops
    working_dir: /app

volumes:
  pgdata:
  grafana_data:
  rawdata:
  parquetdata:
